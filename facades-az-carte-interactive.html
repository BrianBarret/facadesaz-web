<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nos chantiers — SARL Façades A.Z</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --green:      #5a9e1a;
    --green-dark: #3d6e10;
    --green-deep: #1a5a30;
    --orange:     #c97d10;
    --off-white:  #f4f5f2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Barlow', sans-serif; background: white; display: flex; flex-direction: column; }

  /* CARTE */
  .map-wrapper { position: relative; width: 100%; height: 560px; overflow: hidden; flex: 1; }
  #map { width: 100%; height: 100%; }
  .map-wrapper::after {
    content: ''; position: absolute; inset: 0;
    box-shadow: inset 0 0 50px rgba(0,0,0,0.2);
    pointer-events: none; z-index: 400;
  }

  /* LÉGENDE */
  .legend-bar {
    background: white; border-top: 3px solid var(--green);
    padding: 13px 20px; display: flex; align-items: center;
    flex-wrap: wrap; gap: 8px;
  }
  .legend-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: #999; margin-right: 4px; white-space: nowrap;
  }
  .legend-item {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 13px 5px 9px; border-radius: 20px;
    border: 1.5px solid #e0e0e0; cursor: pointer;
    transition: all 0.18s; background: var(--off-white); user-select: none;
  }
  .legend-item:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
  .legend-item.active { background: white; }
  .legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .legend-item span { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; }
  .legend-reset {
    margin-left: auto; font-size: 12px; font-weight: 600;
    color: #bbb; cursor: pointer; padding: 5px 10px;
    border-radius: 4px; transition: color 0.15s; white-space: nowrap;
  }
  .legend-reset:hover { color: var(--green); }

  /* POPUP SURVOL */
  .chantier-popup {
    position: fixed; z-index: 9999;
    pointer-events: none; width: 300px;
    opacity: 0; transition: opacity 0.15s ease;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.45));
  }
  .chantier-popup.visible { opacity: 1; }
  .chantier-popup.above { transform: translate(-50%, calc(-100% - 16px)); }
  .chantier-popup.below { transform: translate(-50%, 16px); }
  .chantier-popup.above .arrow-up   { display: none; }
  .chantier-popup.below .arrow-down { display: none; }

  .popup-inner {
    background: #1c2b1c; border-radius: 10px;
    overflow: hidden; border: 1px solid rgba(255,255,255,0.08);
  }
  .popup-photo-placeholder {
    width: 100%; height: 170px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    position: relative; overflow: hidden; background: #243024;
  }
  .popup-photo-placeholder::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 18px 18px;
  }
  .ph-icon { font-size: 36px; position: relative; z-index: 1; opacity: 0.5; }
  .ph-text {
    font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: rgba(255,255,255,0.22);
    position: relative; z-index: 1;
  }
  .popup-stripe { height: 3px; width: 100%; }
  .popup-body { padding: 11px 14px 13px; }
  .popup-specialty {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px;
  }
  .popup-town {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 800;
    color: white; letter-spacing: 0.5px; line-height: 1;
  }
  .popup-click-hint {
    font-size: 10px; color: rgba(255,255,255,0.28);
    margin-top: 6px; letter-spacing: 0.5px;
  }
  .arrow-down, .arrow-up {
    width: 0; height: 0; margin: 0 auto;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
  }
  .arrow-down { border-top: 10px solid #1c2b1c; }
  .arrow-up   { border-bottom: 10px solid #1c2b1c; }

  /* MARQUEURS */
  .marker-wrap { position: relative; width: 34px; cursor: pointer; }
  .marker-pin {
    width: 34px; height: 34px;
    border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center;
    border: 2px solid rgba(255,255,255,0.35);
    box-shadow: 0 3px 10px rgba(0,0,0,0.45); transition: transform 0.2s;
  }
  .pin-icon { transform: rotate(45deg); font-size: 13px; line-height: 1; }
  .marker-shadow {
    width: 8px; height: 3px; background: rgba(0,0,0,0.25);
    border-radius: 50%; margin: 2px auto 0; filter: blur(2px);
  }
  .marker-pulse {
    position: absolute; top: 17px; left: 17px;
    transform: translate(-50%, -50%);
    width: 34px; height: 34px; border-radius: 50%; border: 2px solid;
    animation: pulseRing 2.8s ease-out infinite; pointer-events: none;
  }
  @keyframes pulseRing {
    0%   { transform: translate(-50%,-50%) scale(0.8); opacity: 0.5; }
    100% { transform: translate(-50%,-50%) scale(2.4); opacity: 0; }
  }

  /* LIGHTBOX */
  .lightbox {
    position: fixed; inset: 0; z-index: 99999;
    background: rgba(0,0,0,0.72);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.22s ease;
    backdrop-filter: blur(3px);
  }
  .lightbox.visible { opacity: 1; pointer-events: all; }
  .lightbox-card {
    background: #1c2b1c; border-radius: 14px; overflow: hidden;
    width: 540px; max-width: 92vw; position: relative;
    box-shadow: 0 24px 60px rgba(0,0,0,0.65);
    border: 1px solid rgba(255,255,255,0.1);
    transform: scale(0.94); transition: transform 0.22s ease;
  }
  .lightbox.visible .lightbox-card { transform: scale(1); }
  .lightbox-photo {
    width: 100%; height: 310px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    background: #243024; position: relative; overflow: hidden;
  }
  .lightbox-photo::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 22px 22px;
  }
  .lb-icon { font-size: 56px; position: relative; z-index: 1; opacity: 0.4; }
  .lb-text {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: rgba(255,255,255,0.18);
    position: relative; z-index: 1;
  }
  .lightbox-stripe { height: 4px; width: 100%; }
  .lightbox-body { padding: 22px 26px 26px; }
  .lb-specialty {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px;
  }
  .lb-town {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px; font-weight: 800;
    color: white; line-height: 1; margin-bottom: 10px;
  }
  .lb-desc { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.6; }
  .lightbox-close {
    position: absolute; top: 14px; right: 14px;
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.15);
    color: white; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; z-index: 10;
    line-height: 1;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.15); }

  /* LEAFLET */
  .leaflet-control-zoom { border: none !important; box-shadow: 0 2px 8px rgba(0,0,0,0.2) !important; }
  .leaflet-control-zoom a { background: rgba(28,43,28,0.92) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; }
  .leaflet-control-zoom a:hover { background: var(--green) !important; }
  .leaflet-control-attribution { background: rgba(0,0,0,0.25) !important; color: rgba(0,0,0,0.35) !important; font-size: 9px !important; }
</style>
</head>
<body>

<div class="map-wrapper"><div id="map"></div></div>

<div class="legend-bar">
  <span class="legend-label">Spécialités :</span>
  <div class="legend-item active" style="border-color:#c8e6a0" onclick="filterMarkers('ite',this)">
    <div class="legend-dot" style="background:#5a9e1a"></div>
    <span style="color:#5a9e1a">Isolation extérieure</span>
  </div>
  <div class="legend-item active" style="border-color:#9ecfb0" onclick="filterMarkers('enduit',this)">
    <div class="legend-dot" style="background:#2a7a40"></div>
    <span style="color:#2a7a40">Enduits de façades</span>
  </div>
  <div class="legend-item active" style="border-color:#7aaa90" onclick="filterMarkers('joint',this)">
    <div class="legend-dot" style="background:#1a5a30"></div>
    <span style="color:#1a5a30">Joints de pierre</span>
  </div>
  <div class="legend-item active" style="border-color:#e8c88a" onclick="filterMarkers('peinture',this)">
    <div class="legend-dot" style="background:#c97d10"></div>
    <span style="color:#c97d10">Peinture</span>
  </div>
  <div class="legend-reset" onclick="resetFilter()">↺ Tout afficher</div>
</div>

<!-- POPUP SURVOL -->
<div id="popup" class="chantier-popup above">
  <div class="arrow-up"></div>
  <div class="popup-inner">
    <div id="popupPhotoWrap">
      <img id="popupPhoto" src="" alt="" style="width:100%;height:170px;object-fit:cover;display:block;">
    </div>
    <div class="popup-stripe" id="popupStripe"></div>
    <div class="popup-body">
      <div class="popup-specialty" id="popupSpec"></div>
      <div class="popup-town" id="popupTown"></div>
      <div class="popup-click-hint">Cliquer pour agrandir</div>
    </div>
  </div>
  <div class="arrow-down"></div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-card">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <div class="lightbox-photo" style="padding:0;">
      <img id="lbPhoto" src="" alt="" style="width:100%;height:310px;object-fit:cover;display:block;">
    </div>
    <div class="lightbox-stripe" id="lbStripe"></div>
    <div class="lightbox-body">
      <div class="lb-specialty" id="lbSpec"></div>
      <div class="lb-town" id="lbTown"></div>
      <div class="lb-desc" id="lbDesc"></div>
    </div>
  </div>
</div>

<script>
const chantiers = [
  // Isolation extérieure
  { lat:44.628, lng:4.388, town:"Aubenas",               type:"ite",      color:"#5a9e1a", specialty:"Isolation extérieure", icon:"🏠", photo:"https://brianbarret.github.io/facadesaz-web/photos/ite1.jpg",      desc:"Isolation thermique par l'extérieur — polystyrène graphité, finition enduit gratté." },
  { lat:44.615, lng:4.401, town:"Aubenas",               type:"ite",      color:"#5a9e1a", specialty:"Isolation extérieure", icon:"🏠", photo:"https://brianbarret.github.io/facadesaz-web/photos/ite2.jpg",      desc:"ITE sur résidence de 6 logements — bardage minéral, performance énergétique renforcée." },
  // Enduits de façades
  { lat:44.711, lng:4.212, town:"Montpezat-sous-Bauzon", type:"enduit",   color:"#2a7a40", specialty:"Enduits de façades",  icon:"🧱", photo:"https://brianbarret.github.io/facadesaz-web/photos/enduit1.jpg",  desc:"Ravalement complet en enduit monocouche gratté — maison de village, ton sable chaud." },
  { lat:44.553, lng:4.600, town:"Alba-la-Romaine",       type:"enduit",   color:"#2a7a40", specialty:"Enduits de façades",  icon:"🧱", photo:"https://brianbarret.github.io/facadesaz-web/photos/enduit2.jpg",  desc:"Enduit de façade sur mas rénové — finition taloché, teinte personnalisée au nuancier." },
  // Joints de pierre
  { lat:44.509, lng:4.290, town:"Laurac-en-Vivarais",    type:"joint",    color:"#1a5a30", specialty:"Joints de pierre",    icon:"⛏",  photo:"https://brianbarret.github.io/facadesaz-web/photos/joint1.jpg",   desc:"Rejointoiement complet façade en pierre calcaire ardéchoise — mortier traditionnel teinté pierre." },
  { lat:44.732, lng:4.618, town:"Coux",                  type:"joint",    color:"#1a5a30", specialty:"Joints de pierre",    icon:"⛏",  photo:"https://brianbarret.github.io/facadesaz-web/photos/joint2.jpg",   desc:"Restauration joints de façade en pierres anciennes — savoir-faire patrimoine." },
  // Peinture
  { lat:44.500, lng:4.479, town:"Saint-Maurice-d'Ibie",  type:"peinture", color:"#c97d10", specialty:"Peinture",            icon:"🖌", photo:"https://brianbarret.github.io/facadesaz-web/photos/peinture1.jpg", desc:"Peinture extérieure façade et volets — maison de maître, finition satinée deux tons." },
  { lat:44.479, lng:4.239, town:"Joyeuse",               type:"peinture", color:"#c97d10", specialty:"Peinture",            icon:"🖌", photo:"https://brianbarret.github.io/facadesaz-web/photos/peinture2.jpg", desc:"Peinture intérieure et extérieure — rénovation complète, gamme produits professionnels." },
];

const map = L.map('map', { center:[44.62,4.38], zoom:11, zoomControl:true, scrollWheelZoom:false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  subdomains:'abcd', maxZoom:18, attribution:'© CartoDB © OpenStreetMap'
}).addTo(map);

fetch('https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/departements/07-ardeche/07-ardeche.json')
  .then(r=>r.json()).then(data=>{
    L.geoJSON(data,{ style:{ color:'#5a9e1a', weight:2, opacity:0.7, fillColor:'#5a9e1a', fillOpacity:0.06, dashArray:'6,4' }}).addTo(map);
  }).catch(()=>{});

// POPUP
const popup     = document.getElementById('popup');
const popupIcon = document.getElementById('popupIcon');
const popupStripe = document.getElementById('popupStripe');
const popupSpec = document.getElementById('popupSpec');
const popupTown = document.getElementById('popupTown');
const POPUP_W   = 300;
const POPUP_H   = 260; // hauteur approximative du popup
let hideTimer   = null;
let currentCh   = null;

function positionPopup(x, y) {
  const margin = 10;
  // Horizontal : empêche de sortir à droite ou à gauche
  let left = x;
  if (left - POPUP_W/2 < margin) left = POPUP_W/2 + margin;
  if (left + POPUP_W/2 > window.innerWidth - margin) left = window.innerWidth - POPUP_W/2 - margin;

  // Vertical : au-dessus ou en-dessous selon place disponible
  const above = y - POPUP_H - 20 > margin;
  popup.classList.toggle('above', above);
  popup.classList.toggle('below', !above);

  popup.style.left = left + 'px';
  popup.style.top  = above ? (y - 16) + 'px' : (y + 24) + 'px';
}

function showPopup(x, y, ch) {
  clearTimeout(hideTimer);
  currentCh = ch;
  document.getElementById('popupPhoto').src   = ch.photo;
  document.getElementById('popupPhoto').alt   = ch.town;
  popupStripe.style.background = ch.color;
  popupSpec.textContent        = ch.specialty;
  popupSpec.style.color        = ch.color;
  popupTown.textContent        = ch.town;
  positionPopup(x, y);
  popup.classList.add('visible');
}

function scheduleHide() {
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => popup.classList.remove('visible'), 250);
}

document.addEventListener('mousemove', e => {
  if (popup.classList.contains('visible')) positionPopup(e.clientX, e.clientY);
});

// LIGHTBOX
function openLightbox(ch) {
  popup.classList.remove('visible');
  document.getElementById('lbPhoto').src          = ch.photo;
  document.getElementById('lbStripe').style.background = ch.color;
  document.getElementById('lbSpec').textContent    = ch.specialty;
  document.getElementById('lbSpec').style.color    = ch.color;
  document.getElementById('lbTown').textContent    = ch.town;
  document.getElementById('lbDesc').textContent    = ch.desc;
  document.getElementById('lightbox').classList.add('visible');
}

function closeLightbox(e) {
  if (!e || e.target === document.getElementById('lightbox') || e.target.classList.contains('lightbox-close')) {
    document.getElementById('lightbox').classList.remove('visible');
  }
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox({target:document.getElementById('lightbox')}); });

// MARQUEURS
const allMarkers = [];
chantiers.forEach(ch => {
  const icon = L.divIcon({
    className: '',
    html: `<div class="marker-wrap">
      <div class="marker-pulse" style="border-color:${ch.color}"></div>
      <div class="marker-pin" style="background:${ch.color}">
        <span class="pin-icon">${ch.icon}</span>
      </div>
      <div class="marker-shadow"></div>
    </div>`,
    iconSize:[34,44], iconAnchor:[17,44],
  });

  const m = L.marker([ch.lat,ch.lng],{icon}).addTo(map);

  m.on('mouseover', e => {
    showPopup(e.originalEvent.clientX, e.originalEvent.clientY, ch);
    e.target.getElement().querySelector('.marker-pin').style.transform = 'rotate(-45deg) scale(1.25)';
  });
  m.on('mouseout', e => {
    scheduleHide();
    e.target.getElement().querySelector('.marker-pin').style.transform = '';
  });
  m.on('click', e => {
    L.DomEvent.stopPropagation(e);
    openLightbox(ch);
  });

  m._type = ch.type;
  allMarkers.push(m);
});

// FILTRE
const active = new Set(['ite','enduit','joint','peinture']);
function filterMarkers(type,el) {
  if(active.size===1&&active.has(type)){resetFilter();return;}
  if(active.has(type)){active.delete(type);el.classList.remove('active');}
  else{active.add(type);el.classList.add('active');}
  applyFilter();
}
function resetFilter() {
  active.clear();['ite','enduit','joint','peinture'].forEach(t=>active.add(t));
  document.querySelectorAll('.legend-item').forEach(el=>el.classList.add('active'));
  applyFilter();
}
function applyFilter() {
  allMarkers.forEach(m=>{
    active.has(m._type)?(!map.hasLayer(m)&&map.addLayer(m)):(map.hasLayer(m)&&map.removeLayer(m));
  });
}
</script>
</body>
</html>
